server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # config.js is generated at container start — never cache it
    location = /config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Hashed assets (Vite output) — cache forever
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all unknown paths → index.html so React Router handles them
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;
}
